services:
  ollama:
    image: ollama/ollama:latest
    container_name: aion-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build: .
    container_name: aion-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models          # large model files — keep on host
      - ./data:/app/data               # PDF/document corpus
      - ./cache:/app/cache             # persistent caches
      - ./generated_images:/app/generated_images
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data:
